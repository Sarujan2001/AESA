<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AESA Team Photo Manager</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: #111318;
        background: #f5f1e8;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header,
      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      header {
        display: flex;
        gap: 18px;
        align-items: end;
        justify-content: space-between;
        padding: 28px 0 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 0.96;
      }

      p {
        margin: 0;
        color: #5f6670;
        line-height: 1.55;
      }

      a {
        color: #d71920;
        font-weight: 800;
      }

      .layout {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        display: grid;
        gap: 14px;
        padding: 18px;
        background: #ffffff;
        border: 1px solid #d8d1c4;
      }

      label {
        display: grid;
        gap: 7px;
        font-weight: 800;
      }

      input,
      select,
      button {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid #c9ced6;
        font: inherit;
      }

      button {
        color: #ffffff;
        background: #111318;
        cursor: pointer;
        font-weight: 900;
      }

      button.secondary {
        color: #111318;
        background: #ffffff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .stage {
        position: relative;
        min-height: 620px;
        overflow: hidden;
        background: #dfe3e8;
        border: 1px solid #c9ced6;
      }

      .stage img {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: none;
        user-select: none;
        transform-origin: center;
      }

      .crop-box {
        position: absolute;
        top: 50%;
        left: 50%;
        width: min(460px, 72vw);
        aspect-ratio: 4 / 3;
        border: 3px solid #7a35ff;
        box-shadow: 0 0 0 9999px rgba(17, 19, 24, 0.42);
        cursor: move;
        transform: translate(-50%, -50%);
      }

      .crop-box::before,
      .crop-box::after {
        position: absolute;
        inset: 33.333% 0 auto;
        height: 1px;
        content: "";
        background: rgba(255, 255, 255, 0.75);
      }

      .crop-box::after {
        inset: auto 0 33.333%;
      }

      .preview {
        display: grid;
        grid-template-columns: 82px 1fr;
        gap: 12px;
        align-items: center;
        padding: 12px;
        background: #f5f1e8;
      }

      .preview img {
        width: 82px;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        background: #dfe3e8;
      }

      .status {
        min-height: 24px;
        color: #d71920;
        font-weight: 800;
      }

      @media (max-width: 900px) {
        header,
        .layout {
          display: grid;
          grid-template-columns: 1fr;
        }

        .stage {
          min-height: 460px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Team Photo Manager</h1>
        <p>Upload, crop, and save a team portrait directly to the AESA website repository.</p>
      </div>
      <a href="/admin/">Admin home</a>
    </header>

    <main class="layout">
      <aside class="panel">
        <label>
          GitHub token
          <input id="tokenInput" type="password" autocomplete="off" placeholder="github_pat_..." />
        </label>
        <button class="secondary" id="rememberTokenButton" type="button">Remember token on this browser</button>

        <label>
          Team section
          <select id="sectionInput">
            <option value="executiveTeam">Executive Team</option>
            <option value="generalCommittee">General Committee</option>
          </select>
        </label>

        <label>
          Member
          <select id="memberInput"></select>
        </label>

        <div class="preview">
          <img id="currentPhoto" alt="" />
          <div>
            <strong id="currentName">Loading...</strong>
            <p id="currentRole"></p>
          </div>
        </div>

        <label>
          New photo
          <input id="fileInput" type="file" accept="image/*" />
        </label>

        <label>
          Crop shape
          <select id="aspectInput">
            <option value="4/3">Team card 4:3</option>
            <option value="3/4">Portrait 3:4</option>
            <option value="1/1">Square 1:1</option>
          </select>
        </label>

        <label>
          Zoom
          <input id="zoomInput" type="range" min="0.4" max="3" step="0.01" value="1" />
        </label>

        <button id="saveButton" type="button" disabled>Crop and save to website</button>
        <button class="secondary" id="reloadButton" type="button">Reload latest team data</button>
        <p class="status" id="statusText"></p>
      </aside>

      <section class="stage" id="stage">
        <img id="sourceImage" alt="" />
        <div class="crop-box" id="cropBox" aria-label="Crop area"></div>
      </section>
    </main>

    <script>
      const owner = "Sarujan2001";
      const repo = "AESA";
      const branch = "main";
      const teamPath = "my-app/src/data/team.json";
      const uploadDir = "my-app/public/uploads";

      const tokenInput = document.querySelector("#tokenInput");
      const rememberTokenButton = document.querySelector("#rememberTokenButton");
      const sectionInput = document.querySelector("#sectionInput");
      const memberInput = document.querySelector("#memberInput");
      const fileInput = document.querySelector("#fileInput");
      const aspectInput = document.querySelector("#aspectInput");
      const zoomInput = document.querySelector("#zoomInput");
      const saveButton = document.querySelector("#saveButton");
      const reloadButton = document.querySelector("#reloadButton");
      const statusText = document.querySelector("#statusText");
      const stage = document.querySelector("#stage");
      const image = document.querySelector("#sourceImage");
      const cropBox = document.querySelector("#cropBox");
      const currentPhoto = document.querySelector("#currentPhoto");
      const currentName = document.querySelector("#currentName");
      const currentRole = document.querySelector("#currentRole");

      const state = {
        teamData: null,
        teamSha: "",
        naturalWidth: 0,
        naturalHeight: 0,
        imageX: 0,
        imageY: 0,
        zoom: 1,
        dragging: false,
        dragStartX: 0,
        dragStartY: 0,
        startX: 0,
        startY: 0,
      };

      tokenInput.value = localStorage.getItem("aesaGithubToken") || "";

      function setStatus(message) {
        statusText.textContent = message;
      }

      function toBase64(text) {
        return btoa(unescape(encodeURIComponent(text)));
      }

      function fromBase64(text) {
        return decodeURIComponent(escape(atob(text.replace(/\n/g, ""))));
      }

      async function github(path, options = {}) {
        const token = tokenInput.value.trim();
        const headers = {
          Accept: "application/vnd.github+json",
          "X-GitHub-Api-Version": "2022-11-28",
          ...options.headers,
        };

        if (token) {
          headers.Authorization = `Bearer ${token}`;
        }

        const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
          ...options,
          headers,
        });

        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.message || `GitHub request failed: ${response.status}`);
        }

        return response.json();
      }

      async function loadTeamData() {
        setStatus("Loading team data...");
        const result = await github(`${teamPath}?ref=${branch}`);
        state.teamData = JSON.parse(fromBase64(result.content));
        state.teamSha = result.sha;
        renderMembers();
        setStatus("Team data loaded.");
      }

      function renderMembers() {
        const section = sectionInput.value;
        const members = state.teamData?.[section] || [];

        memberInput.innerHTML = members.map((member, index) => `<option value="${index}">${member.name}</option>`).join("");
        updateCurrentMember();
      }

      function currentMember() {
        return state.teamData[sectionInput.value][Number(memberInput.value || 0)];
      }

      function updateCurrentMember() {
        if (!state.teamData) return;
        const member = currentMember();
        currentName.textContent = member?.name || "No member selected";
        currentRole.textContent = member?.role || "";
        currentPhoto.src = member?.photo || "";
      }

      function getAspect() {
        const [w, h] = aspectInput.value.split("/").map(Number);
        return w / h;
      }

      function updateCropBox() {
        cropBox.style.aspectRatio = aspectInput.value;
      }

      function fitImage() {
        if (!state.naturalWidth) return;
        const rect = stage.getBoundingClientRect();
        const baseScale = Math.max(rect.width / state.naturalWidth, rect.height / state.naturalHeight);
        const displayWidth = state.naturalWidth * baseScale * state.zoom;
        const displayHeight = state.naturalHeight * baseScale * state.zoom;

        image.style.width = `${displayWidth}px`;
        image.style.height = `${displayHeight}px`;
        image.style.transform = `translate(calc(-50% + ${state.imageX}px), calc(-50% + ${state.imageY}px))`;
      }

      function resetCrop() {
        state.imageX = 0;
        state.imageY = 0;
        state.zoom = 1;
        zoomInput.value = "1";
        updateCropBox();
        fitImage();
      }

      function canvasToBase64(canvas) {
        return canvas.toDataURL("image/jpeg", 0.92).split(",")[1];
      }

      function slugify(value) {
        return value.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "") || "team-photo";
      }

      function makeCroppedCanvas() {
        const cropRect = cropBox.getBoundingClientRect();
        const imageRect = image.getBoundingClientRect();
        const scaleX = state.naturalWidth / imageRect.width;
        const scaleY = state.naturalHeight / imageRect.height;
        const sourceX = Math.max(0, (cropRect.left - imageRect.left) * scaleX);
        const sourceY = Math.max(0, (cropRect.top - imageRect.top) * scaleY);
        const sourceWidth = Math.min(state.naturalWidth - sourceX, cropRect.width * scaleX);
        const sourceHeight = Math.min(state.naturalHeight - sourceY, cropRect.height * scaleY);
        const outputWidth = 1200;
        const outputHeight = Math.round(outputWidth / getAspect());
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        canvas.width = outputWidth;
        canvas.height = outputHeight;
        context.drawImage(image, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, outputWidth, outputHeight);
        return canvas;
      }

      async function savePhoto() {
        if (!state.teamData || !state.naturalWidth) return;

        const token = tokenInput.value.trim();
        if (!token) {
          setStatus("Paste your GitHub token first.");
          return;
        }

        const member = currentMember();
        const section = sectionInput.value;
        const memberName = member.name;
        const fileName = `${slugify(member.name)}-${Date.now()}.jpg`;
        const uploadPath = `${uploadDir}/${fileName}`;
        const publicPath = `/uploads/${fileName}`;
        const canvas = makeCroppedCanvas();

        saveButton.disabled = true;
        setStatus("Uploading cropped photo...");

        await github(uploadPath, {
          method: "PUT",
          body: JSON.stringify({
            message: `Upload cropped team photo for ${member.name}`,
            content: canvasToBase64(canvas),
            branch,
          }),
        });

        setStatus("Updating team page data...");

        const latest = await github(`${teamPath}?ref=${branch}`);
        state.teamSha = latest.sha;
        const latestTeamData = JSON.parse(fromBase64(latest.content));
        const latestMembers = latestTeamData[section] || [];
        const latestMemberIndex = latestMembers.findIndex((teamMember) => teamMember.name === memberName);

        if (latestMemberIndex === -1) {
          throw new Error(`${memberName} was not found in the latest team data. Reload and try again.`);
        }

        latestTeamData[section][latestMemberIndex] = {
          ...latestMembers[latestMemberIndex],
          photo: publicPath,
          photoFit: "cover",
          photoX: 50,
          photoY: 50,
          photoZoom: "1",
        };

        await github(teamPath, {
          method: "PUT",
          body: JSON.stringify({
            message: `Update team photo for ${memberName}`,
            content: toBase64(`${JSON.stringify(latestTeamData, null, 2)}\n`),
            sha: state.teamSha,
            branch,
          }),
        });

        state.teamData = latestTeamData;
        renderMembers();
        memberInput.value = String(latestMemberIndex);
        currentPhoto.src = publicPath;
        setStatus("Saved. GitHub Pages will update after the deployment finishes.");
        saveButton.disabled = false;
      }

      rememberTokenButton.addEventListener("click", () => {
        localStorage.setItem("aesaGithubToken", tokenInput.value.trim());
        setStatus("Token remembered on this browser.");
      });

      sectionInput.addEventListener("change", renderMembers);
      memberInput.addEventListener("change", updateCurrentMember);
      aspectInput.addEventListener("change", updateCropBox);
      reloadButton.addEventListener("click", loadTeamData);
      saveButton.addEventListener("click", () => savePhoto().catch((error) => {
        saveButton.disabled = false;
        setStatus(error.message);
      }));

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);

        image.onload = () => {
          state.naturalWidth = image.naturalWidth;
          state.naturalHeight = image.naturalHeight;
          resetCrop();
          saveButton.disabled = false;
          setStatus("Crop the photo, then save it.");
        };

        image.src = url;
      });

      zoomInput.addEventListener("input", () => {
        state.zoom = Number(zoomInput.value);
        fitImage();
      });

      stage.addEventListener("pointerdown", (event) => {
        if (!state.naturalWidth) return;
        state.dragging = true;
        state.dragStartX = event.clientX;
        state.dragStartY = event.clientY;
        state.startX = state.imageX;
        state.startY = state.imageY;
        stage.setPointerCapture(event.pointerId);
      });

      stage.addEventListener("pointermove", (event) => {
        if (!state.dragging) return;
        state.imageX = state.startX + event.clientX - state.dragStartX;
        state.imageY = state.startY + event.clientY - state.dragStartY;
        fitImage();
      });

      stage.addEventListener("pointerup", () => {
        state.dragging = false;
      });

      window.addEventListener("resize", fitImage);
      updateCropBox();
      loadTeamData().catch((error) => setStatus(error.message));
    </script>
  </body>
</html>
