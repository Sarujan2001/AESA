<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AESA Image Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #ffffff;
        --ink: #111827;
        --muted: #5f6670;
        --soft: #f3f4f6;
        --line: #e5e7eb;
        --red: #d71920;
        --red-dark: #b51218;
        --emerald: #10b981;
        --amber: #f59e0b;
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(17, 24, 39, 0.04) 1px, transparent 1px),
          linear-gradient(rgba(17, 24, 39, 0.04) 1px, transparent 1px),
          var(--bg);
        background-size: 42px 42px;
        font-family: "Outfit", system-ui, sans-serif;
      }

      header,
      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      header {
        display: flex;
        gap: 18px;
        align-items: end;
        justify-content: space-between;
        padding: 28px 0 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 5vw, 4rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 0.96;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      a {
        color: var(--red);
        font-weight: 800;
      }

      .layout {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        display: grid;
        gap: 14px;
        padding: 18px;
        background: #ffffff;
        border: 0;
        border-radius: var(--radius);
      }

      label {
        display: grid;
        gap: 7px;
        font-weight: 800;
      }

      input,
      select,
      button {
        width: 100%;
        min-height: 44px;
        padding: 11px 12px;
        border: 0;
        border-radius: var(--radius);
        font: inherit;
      }

      input,
      select {
        color: var(--ink);
        background: var(--soft);
      }

      input:focus,
      select:focus,
      button:focus-visible,
      a:focus-visible {
        outline: 3px solid var(--red);
        outline-offset: 3px;
      }

      button {
        color: #ffffff;
        background: var(--red);
        cursor: pointer;
        font-weight: 900;
        transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
      }

      button.secondary {
        color: var(--ink);
        background: var(--soft);
      }

      button:hover {
        background: var(--ink);
        transform: scale(1.02);
      }

      button.secondary:hover {
        color: #ffffff;
        background: var(--red);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .stage {
        position: relative;
        min-height: 620px;
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(17, 24, 39, 0.08) 1px, transparent 1px),
          linear-gradient(rgba(17, 24, 39, 0.08) 1px, transparent 1px),
          var(--soft);
        background-size: 28px 28px;
        border-radius: var(--radius);
      }

      .stage img {
        position: absolute;
        top: 50%;
        left: 50%;
        max-width: none;
        user-select: none;
        transform-origin: center;
      }

      .crop-box {
        position: absolute;
        top: 50%;
        left: 50%;
        width: min(460px, 72vw);
        aspect-ratio: 4 / 3;
        border: 4px solid var(--red);
        background: rgba(255, 255, 255, 0.08);
        cursor: move;
        transform: translate(-50%, -50%);
      }

      .crop-box::before,
      .crop-box::after {
        position: absolute;
        inset: 33.333% 0 auto;
        height: 1px;
        content: "";
        background: rgba(255, 255, 255, 0.75);
      }

      .crop-box::after {
        inset: auto 0 33.333%;
      }

      .preview {
        display: grid;
        grid-template-columns: 82px 1fr;
        gap: 12px;
        align-items: center;
        padding: 12px;
        background: var(--soft);
        border-radius: var(--radius);
      }

      .preview img {
        width: 82px;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        background: var(--line);
        border-radius: var(--radius);
      }

      .status {
        min-height: 24px;
        color: var(--red);
        font-weight: 800;
      }

      @media (max-width: 900px) {
        header,
        .layout {
          display: grid;
          grid-template-columns: 1fr;
        }

        .stage {
          min-height: 460px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Image Manager</h1>
        <p>Choose an existing website image or upload a new one, crop it, and save it directly to the AESA repository.</p>
      </div>
      <a href="/admin/">Admin home</a>
    </header>

    <main class="layout">
      <aside class="panel">
        <label>
          GitHub token
          <input id="tokenInput" type="password" autocomplete="off" placeholder="github_pat_..." />
        </label>
        <button class="secondary" id="rememberTokenButton" type="button">Remember token on this browser</button>

        <label>
          Image group
          <select id="groupInput">
            <option value="team:executiveTeam">Executive Team Photos</option>
            <option value="team:generalCommittee">General Committee Photos</option>
            <option value="past:pastEvents">Past Event Images</option>
            <option value="sponsors:sponsors">Sponsor Logos</option>
          </select>
        </label>

        <label>
          Image item
          <select id="itemInput"></select>
        </label>

        <div class="preview">
          <img id="currentPhoto" alt="" />
          <div>
            <strong id="currentName">Loading...</strong>
            <p id="currentRole"></p>
          </div>
        </div>

        <label>
          New photo
          <input id="fileInput" type="file" accept="image/*" />
        </label>

        <button class="secondary" id="useCurrentButton" type="button">Edit current image</button>

        <label>
          Crop shape
          <select id="aspectInput">
            <option value="4/3">Team card 4:3</option>
            <option value="3/4">Portrait 3:4</option>
            <option value="1/1">Square 1:1</option>
          </select>
        </label>

        <label>
          Zoom
          <input id="zoomInput" type="range" min="0.4" max="3" step="0.01" value="1" />
        </label>

        <button id="saveButton" type="button" disabled>Crop and save to website</button>
        <button class="secondary" id="reloadButton" type="button">Reload latest image data</button>
        <p class="status" id="statusText"></p>
      </aside>

      <section class="stage" id="stage">
        <img id="sourceImage" alt="" />
        <div class="crop-box" id="cropBox" aria-label="Crop area"></div>
      </section>
    </main>

    <script>
      const owner = "Sarujan2001";
      const repo = "AESA";
      const branch = "main";
      const uploadDir = "my-app/public/uploads";
      const dataFiles = {
        team: "my-app/src/data/team.json",
        past: "my-app/src/data/pastEvents.json",
        sponsors: "my-app/src/data/sponsors.json",
      };

      const tokenInput = document.querySelector("#tokenInput");
      const rememberTokenButton = document.querySelector("#rememberTokenButton");
      const groupInput = document.querySelector("#groupInput");
      const itemInput = document.querySelector("#itemInput");
      const fileInput = document.querySelector("#fileInput");
      const useCurrentButton = document.querySelector("#useCurrentButton");
      const aspectInput = document.querySelector("#aspectInput");
      const zoomInput = document.querySelector("#zoomInput");
      const saveButton = document.querySelector("#saveButton");
      const reloadButton = document.querySelector("#reloadButton");
      const statusText = document.querySelector("#statusText");
      const stage = document.querySelector("#stage");
      const image = document.querySelector("#sourceImage");
      const cropBox = document.querySelector("#cropBox");
      const currentPhoto = document.querySelector("#currentPhoto");
      const currentName = document.querySelector("#currentName");
      const currentRole = document.querySelector("#currentRole");

      const state = {
        data: {},
        shas: {},
        currentSourceUrl: "",
        naturalWidth: 0,
        naturalHeight: 0,
        imageX: 0,
        imageY: 0,
        zoom: 1,
        dragging: false,
        dragStartX: 0,
        dragStartY: 0,
        startX: 0,
        startY: 0,
      };

      tokenInput.value = localStorage.getItem("aesaGithubToken") || "";

      function setStatus(message) {
        statusText.textContent = message;
      }

      function toBase64(text) {
        return btoa(unescape(encodeURIComponent(text)));
      }

      function fromBase64(text) {
        return decodeURIComponent(escape(atob(text.replace(/\n/g, ""))));
      }

      async function github(path, options = {}) {
        const token = tokenInput.value.trim();
        const headers = {
          Accept: "application/vnd.github+json",
          "X-GitHub-Api-Version": "2022-11-28",
          ...options.headers,
        };

        if (token) {
          headers.Authorization = `Bearer ${token}`;
        }

        const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
          ...options,
          headers,
        });

        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          const issue = new Error(error.message || `GitHub request failed: ${response.status}`);
          issue.status = response.status;
          throw issue;
        }

        return response.json();
      }

      function currentGroup() {
        const [type, key] = groupInput.value.split(":");
        return { type, key, path: dataFiles[type] };
      }

      async function loadImageData() {
        setStatus("Loading image data...");

        for (const [type, path] of Object.entries(dataFiles)) {
          const result = await github(`${path}?ref=${branch}`);
          state.data[type] = JSON.parse(fromBase64(result.content));
          state.shas[type] = result.sha;
        }

        renderItems();
        setStatus("Image data loaded.");
      }

      function labelForItem(item, type) {
        if (type === "team") return `${item.name} - ${item.role}`;
        if (type === "past") return `${item.year} - ${item.title}`;
        return item.name;
      }

      function imageFieldForType(type) {
        if (type === "sponsors") return "logo";
        if (type === "past") return "image";
        return "photo";
      }

      function renderItems() {
        const { type, key } = currentGroup();
        const items = state.data[type]?.[key] || [];

        itemInput.innerHTML = items.map((item, index) => `<option value="${index}">${labelForItem(item, type)}</option>`).join("");
        updateCurrentItem();
      }

      function currentItem() {
        const { type, key } = currentGroup();
        return state.data[type][key][Number(itemInput.value || 0)];
      }

      function updateCurrentItem() {
        const { type } = currentGroup();
        if (!state.data[type]) return;
        const item = currentItem();
        const field = imageFieldForType(type);
        currentName.textContent = item ? labelForItem(item, type) : "No image selected";
        currentRole.textContent = item?.text || item?.href || "";
        currentPhoto.src = item?.[field] || "";
        state.currentSourceUrl = item?.[field] || "";
      }

      function getAspect() {
        const [w, h] = aspectInput.value.split("/").map(Number);
        return w / h;
      }

      function updateCropBox() {
        cropBox.style.aspectRatio = aspectInput.value;
      }

      function fitImage() {
        if (!state.naturalWidth) return;
        const rect = stage.getBoundingClientRect();
        const baseScale = Math.max(rect.width / state.naturalWidth, rect.height / state.naturalHeight);
        const displayWidth = state.naturalWidth * baseScale * state.zoom;
        const displayHeight = state.naturalHeight * baseScale * state.zoom;

        image.style.width = `${displayWidth}px`;
        image.style.height = `${displayHeight}px`;
        image.style.transform = `translate(calc(-50% + ${state.imageX}px), calc(-50% + ${state.imageY}px))`;
      }

      function resetCrop() {
        state.imageX = 0;
        state.imageY = 0;
        state.zoom = 1;
        zoomInput.value = "1";
        updateCropBox();
        fitImage();
      }

      async function loadImageFromUrl(url) {
        if (!url) {
          setStatus("This item has no current image.");
          return;
        }

        setStatus("Loading current image...");
        image.crossOrigin = "anonymous";
        image.onload = () => {
          state.naturalWidth = image.naturalWidth;
          state.naturalHeight = image.naturalHeight;
          resetCrop();
          saveButton.disabled = false;
          setStatus("Crop the current image, then save it.");
        };
        image.onerror = () => setStatus("Could not load that image for cropping. Upload the original file instead.");
        image.src = url.startsWith("http") ? url : `${window.location.origin}${url}`;
      }

      function canvasToBase64(canvas) {
        return canvas.toDataURL("image/jpeg", 0.92).split(",")[1];
      }

      function slugify(value) {
        return value.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "") || "team-photo";
      }

      function makeCroppedCanvas() {
        const cropRect = cropBox.getBoundingClientRect();
        const imageRect = image.getBoundingClientRect();
        const scaleX = state.naturalWidth / imageRect.width;
        const scaleY = state.naturalHeight / imageRect.height;
        const sourceX = Math.max(0, (cropRect.left - imageRect.left) * scaleX);
        const sourceY = Math.max(0, (cropRect.top - imageRect.top) * scaleY);
        const sourceWidth = Math.min(state.naturalWidth - sourceX, cropRect.width * scaleX);
        const sourceHeight = Math.min(state.naturalHeight - sourceY, cropRect.height * scaleY);
        const outputWidth = 1200;
        const outputHeight = Math.round(outputWidth / getAspect());
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        canvas.width = outputWidth;
        canvas.height = outputHeight;
        context.drawImage(image, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, outputWidth, outputHeight);
        return canvas;
      }

      async function updateImageReference({ type, key, path, itemName, imageField, publicPath }) {
        for (let attempt = 1; attempt <= 3; attempt += 1) {
          const latest = await github(`${path}?ref=${branch}`);
          const latestData = JSON.parse(fromBase64(latest.content));
          const latestItems = latestData[key] || [];
          const latestItemIndex = latestItems.findIndex((candidate) => (candidate.name || candidate.title) === itemName);

          if (latestItemIndex === -1) {
            throw new Error(`${itemName} was not found in the latest data. Reload and try again.`);
          }

          latestData[key][latestItemIndex] = {
            ...latestItems[latestItemIndex],
            [imageField]: publicPath,
          };

          if (type === "team") {
            latestData[key][latestItemIndex].photoFit = "cover";
            latestData[key][latestItemIndex].photoX = 50;
            latestData[key][latestItemIndex].photoY = 50;
            latestData[key][latestItemIndex].photoZoom = "1";
          }

          try {
            await github(path, {
              method: "PUT",
              body: JSON.stringify({
                message: `Update image for ${itemName}`,
                content: toBase64(`${JSON.stringify(latestData, null, 2)}\n`),
                sha: latest.sha,
                branch,
              }),
            });

            return { latestData, latestItemIndex, latestSha: latest.sha };
          } catch (error) {
            const canRetry = error.status === 409 || error.message.includes("does not match");

            if (!canRetry || attempt === 3) {
              throw error;
            }

            setStatus("Website data changed while saving. Reloading latest version and retrying...");
          }
        }
      }

      async function savePhoto() {
        if (!state.naturalWidth) return;

        const token = tokenInput.value.trim();
        if (!token) {
          setStatus("Paste your GitHub token first.");
          return;
        }

        const { type, key, path } = currentGroup();
        const item = currentItem();
        const itemName = item.name || item.title;
        const imageField = imageFieldForType(type);
        const fileName = `${slugify(itemName)}-${Date.now()}.jpg`;
        const uploadPath = `${uploadDir}/${fileName}`;
        const publicPath = `/uploads/${fileName}`;
        const canvas = makeCroppedCanvas();

        saveButton.disabled = true;
        setStatus("Uploading cropped photo...");

        await github(uploadPath, {
          method: "PUT",
          body: JSON.stringify({
            message: `Upload cropped image for ${itemName}`,
            content: canvasToBase64(canvas),
            branch,
          }),
        });

        setStatus("Updating website data...");
        const { latestData, latestItemIndex, latestSha } = await updateImageReference({
          type,
          key,
          path,
          itemName,
          imageField,
          publicPath,
        });

        state.data[type] = latestData;
        state.shas[type] = latestSha;
        renderItems();
        itemInput.value = String(latestItemIndex);
        currentPhoto.src = publicPath;
        setStatus("Saved. GitHub Pages will update after the deployment finishes.");
        saveButton.disabled = false;
      }

      rememberTokenButton.addEventListener("click", () => {
        localStorage.setItem("aesaGithubToken", tokenInput.value.trim());
        setStatus("Token remembered on this browser.");
      });

      groupInput.addEventListener("change", renderItems);
      itemInput.addEventListener("change", updateCurrentItem);
      useCurrentButton.addEventListener("click", () => loadImageFromUrl(state.currentSourceUrl));
      aspectInput.addEventListener("change", updateCropBox);
      reloadButton.addEventListener("click", loadImageData);
      saveButton.addEventListener("click", () => savePhoto().catch((error) => {
        saveButton.disabled = false;
        setStatus(error.message);
      }));

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);

        image.onload = () => {
          state.naturalWidth = image.naturalWidth;
          state.naturalHeight = image.naturalHeight;
          resetCrop();
          saveButton.disabled = false;
          setStatus("Crop the photo, then save it.");
        };

        image.src = url;
      });

      zoomInput.addEventListener("input", () => {
        state.zoom = Number(zoomInput.value);
        fitImage();
      });

      stage.addEventListener("pointerdown", (event) => {
        if (!state.naturalWidth) return;
        state.dragging = true;
        state.dragStartX = event.clientX;
        state.dragStartY = event.clientY;
        state.startX = state.imageX;
        state.startY = state.imageY;
        stage.setPointerCapture(event.pointerId);
      });

      stage.addEventListener("pointermove", (event) => {
        if (!state.dragging) return;
        state.imageX = state.startX + event.clientX - state.dragStartX;
        state.imageY = state.startY + event.clientY - state.dragStartY;
        fitImage();
      });

      stage.addEventListener("pointerup", () => {
        state.dragging = false;
      });

      window.addEventListener("resize", fitImage);
      updateCropBox();
      loadImageData().catch((error) => setStatus(error.message));
    </script>
  </body>
</html>
