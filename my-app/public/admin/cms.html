<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AESA Content Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <a class="admin-home-link" href="/admin/">Admin home</a>
    <style>
      .admin-home-link {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 9999;
        padding: 12px 16px;
        border-radius: 8px;
        color: #ffffff;
        background: #d71920;
        font: 800 14px/1.2 Outfit, system-ui, sans-serif;
        text-decoration: none;
        transition: background 0.2s ease, transform 0.2s ease;
      }

      .admin-home-link:hover {
        background: #111827;
        transform: scale(1.04);
      }

      .admin-home-link:focus-visible {
        outline: 3px solid #d71920;
        outline-offset: 4px;
      }
    </style>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  </body>
</html>
