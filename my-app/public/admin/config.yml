backend:
  name: github
  repo: Sarujan2001/AESA
  branch: main
  auth_methods: [token]

media_folder: "my-app/public/uploads"
public_folder: "/uploads"
site_url: "https://aesa.site"
display_url: "https://aesa.site"
logo_url: "/AESALONG.png"

collections:
  - name: "site"
    label: "Site"
    files:
      - name: "settings"
        label: "Site Settings"
        file: "my-app/src/data/siteSettings.json"
        format: "json"
        fields:
          - label: "Club Details"
            name: "club"
            widget: "object"
            fields:
              - { label: "Full Name", name: "name", widget: "string" }
              - { label: "Short Name", name: "shortName", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - label: "Social Links"
                name: "socials"
                widget: "object"
                fields:
                  - { label: "Facebook", name: "facebook", widget: "string", required: false }
                  - { label: "Instagram", name: "instagram", widget: "string", required: false }
                  - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
                  - { label: "Rubric", name: "rubric", widget: "string", required: false }
                  - { label: "Rubric Events", name: "rubricEvents", widget: "string", required: false }
                  - { label: "Linktree", name: "linktree", widget: "string", required: false }
          - label: "Navigation"
            name: "navItems"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Target", name: "target", widget: "string" }

  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "my-app/src/data/home.json"
        format: "json"
        fields:
          - { label: "Focus Areas", name: "focusAreas", widget: "list", field: { label: "Focus Area", name: "area", widget: "string" } }
          - label: "Stats"
            name: "stats"
            widget: "list"
            summary: "{{fields.value}} - {{fields.label}}"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
      - name: "activities"
        label: "Activities Page"
        file: "my-app/src/data/activities.json"
        format: "json"
        fields:
          - label: "Activities"
            name: "activities"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tag", name: "tag", widget: "string" }
              - { label: "Description", name: "text", widget: "text" }
      - name: "calendar"
        label: "Calendar"
        file: "my-app/src/data/calendar.json"
        format: "json"
        fields:
          - label: "Events"
            name: "calendar"
            widget: "list"
            summary: "{{fields.date}} - {{fields.title}}"
            fields:
              - { label: "Display Date", name: "date", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Time", name: "time", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "ISO Date", name: "isoDate", widget: "string", required: false, hint: "Use YYYY-MM-DD for scheduled events, or leave blank for TBA." }
      - name: "team"
        label: "Team Page"
        file: "my-app/src/data/team.json"
        format: "json"
        fields:
          - label: "Executive Team"
            name: "executiveTeam"
            widget: "list"
            summary: "{{fields.name}} - {{fields.role}}"
            fields: &team_member_fields
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Pronouns", name: "pronouns", widget: "string", required: false }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Description / Fun Fact", name: "text", widget: "text", required: false }
              - { label: "Photo", name: "photo", widget: "image", required: false, hint: "For crop/edit upload, use Admin Home > Team Photo Manager." }
              - label: "Photo Fit"
                name: "photoFit"
                widget: "select"
                required: false
                default: "cover"
                options:
                  - { label: "Crop to fill card", value: "cover" }
                  - { label: "Show full image", value: "contain" }
              - { label: "Crop X", name: "photoX", widget: "number", required: false, default: 50, value_type: "int", min: 0, max: 100, step: 5, hint: "0 = left, 50 = center, 100 = right." }
              - { label: "Crop Y", name: "photoY", widget: "number", required: false, default: 50, value_type: "int", min: 0, max: 100, step: 5, hint: "0 = top, 50 = center, 100 = bottom." }
              - label: "Photo Zoom"
                name: "photoZoom"
                widget: "select"
                required: false
                default: "1"
                options:
                  - { label: "Normal", value: "1" }
                  - { label: "Zoom 1.05x", value: "1.05" }
                  - { label: "Zoom 1.1x", value: "1.1" }
                  - { label: "Zoom 1.2x", value: "1.2" }
                  - { label: "Zoom 1.3x", value: "1.3" }
          - label: "General Committee"
            name: "generalCommittee"
            widget: "list"
            summary: "{{fields.name}}"
            fields: *team_member_fields
      - name: "past_events"
        label: "Past Events"
        file: "my-app/src/data/pastEvents.json"
        format: "json"
        fields:
          - label: "Past Events"
            name: "pastEvents"
            widget: "list"
            summary: "{{fields.year}} - {{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Description", name: "text", widget: "text" }
              - { label: "Image", name: "image", widget: "image", required: false }
      - name: "join"
        label: "Join Page"
        file: "my-app/src/data/join.json"
        format: "json"
        fields:
          - { label: "Join Page Benefits", name: "benefits", widget: "list", field: { label: "Benefit", name: "benefit", widget: "string" } }

  - name: "sponsors"
    label: "Sponsors"
    files:
      - name: "sponsors"
        label: "Sponsors"
        file: "my-app/src/data/sponsors.json"
        format: "json"
        fields:
          - label: "Sponsors"
            name: "sponsors"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Fallback Initials", name: "mark", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Website", name: "href", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image", required: false }
